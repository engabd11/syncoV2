activate:
  name: Activate music sync
  description: >-
    Start music sync for one or more entertainment areas, optionally setting the
    mode and followed media player first.
  target:
    entity:
      integration: hue_music_sync
      domain: switch
  fields:
    mode:
      name: Mode
      description: Sync mode preset to use.
      required: false
      selector:
        select:
          options:
            - subtle
            - medium
            - high
            - intense
            - extreme
    effect:
      name: Effect
      description: Renderer/effect style — music, movies or fireworks.
      required: false
      selector:
        select:
          options:
            - music
            - movies
            - fireworks
    colour:
      name: Colour
      description: Colour theme — album_art or a preset palette.
      required: false
      selector:
        select:
          options:
            - album_art
            - sunset
            - ocean
            - forest
            - lavender
            - ember
            - aurora
            - tropical
            - savanna
            - blossom
            - honolulu
            - galaxy
    brightness:
      name: Brightness
      description: Master brightness ceiling (5-100%).
      required: false
      selector:
        number:
          min: 5
          max: 100
          step: 5
          unit_of_measurement: "%"
    media_player:
      name: Media player
      description: Media player to follow. Leave unset to auto-pick the one playing.
      required: false
      selector:
        entity:
          domain: media_player

deactivate:
  name: Deactivate music sync
  description: Stop music sync for one or more entertainment areas.
  target:
    entity:
      integration: hue_music_sync
      domain: switch

set_options:
