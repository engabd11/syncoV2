activate:
  name: Activate music sync
  description: >-
    Start music sync for one or more entertainment areas, optionally overriding
    the colour scheme, effect mode and followed media player first.
  target:
    entity:
      integration: hue_music_sync
      domain: switch
  fields:
    color_scheme:
      name: Colour scheme
      description: Colour scheme to use.
      required: false
      selector:
        select:
          options:
            - album_art
            - warm
            - cool
            - neon
            - party
            - mono
            - rainbow
    effect_mode:
      name: Effect mode
      description: Choreography mode.
      required: false
      selector:
        select:
          options:
            - pulse
            - spectrum
            - wave
            - ambient
    media_player:
      name: Media player
      description: Media player to follow. Leave unset to auto-pick the one playing.
      required: false
      selector:
        entity:
          domain: media_player

deactivate:
  name: Deactivate music sync
  description: Stop music sync for one or more entertainment areas.
  target:
    entity:
      integration: hue_music_sync
      domain: switch

set_options:
  name: Set music sync options
  description: >-
    Change the colour scheme, effect mode or followed player for an area without
    restarting sync (applies live if it is already active).
  target:
    entity:
      integration: hue_music_sync
      domain: switch
  fields:
    color_scheme:
      name: Colour scheme
      description: Colour scheme to use.
      required: false
      selector:
        select:
          options:
            - album_art
            - warm
            - cool
            - neon
            - party
            - mono
            - rainbow
    effect_mode:
      name: Effect mode
      description: Choreography mode.
      required: false
      selector:
        select:
          options:
            - pulse
            - spectrum
            - wave
            - ambient
    media_player:
      name: Media player
      description: Media player to follow.
      required: false
      selector:
        entity:
          domain: media_player
