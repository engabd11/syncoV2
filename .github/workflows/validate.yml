name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # The brands submission (home-assistant/brands) is pending; drop
          # this ignore once it is merged.
          ignore: brands

  tests:
    name: Unit tests (DSP / colour / encoder)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        # numpy for the DSP; aiohttp (hue.bridge) and cryptography (hue.dtls/
        # stream) are imported by the test modules. They're bundled by Home
        # Assistant at runtime, so the manifest doesn't list them, but the
        # HA-free unit tests still need them installed here.
        run: pip install pytest numpy aiohttp cryptography
      - name: Run tests
        run: pytest tests/ -v

  tests-ha:
    name: Home Assistant harness tests (config flow)
    runs-on: ubuntu-latest
    # New job - flip this off once it has proven green on CI.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install test harness
        # ha-ffmpeg + home-assistant-frontend: the integration hard-depends on
        # the ffmpeg and frontend components, so loading it in the harness
        # needs their requirements importable.
        run: pip install pytest pytest-homeassistant-custom-component numpy ha-ffmpeg home-assistant-frontend
      - name: Run HA-harness tests
        run: pytest tests_ha/ -v
